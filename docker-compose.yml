services:
  postgres:
    image: postgres:16-alpine
    container_name: amore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amore_dev
    ports:
      - "5432:5432"
    volumes:
      - amore-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: amore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  amore-postgres-data:
